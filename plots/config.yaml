  mimic_non_iid_sud_acc:
    df_name: mimic_non_iid_sud_acc
    source:
      tag: Server Acc1
      lines:
        - name: FedAvg
          path: "~/ma-logs/MIMIC4/FEDAVG"
          match: MIMIC_NON_IID_SUD_FEDAVG_seed
        - name: MAX-CS
          path: "~/ma-logs/MIMIC4/MAXCS"
          match: MIMIC_NON_IID_SUD_MAXCS_seed
        - name: UCB-CS (loss)
          path: "~/ma-logs/MIMIC4/UCBCS"
          match: MIMIC_NON_IID_SUD_UCBCS_seed
        - name: 'UCB-CS ($\Delta$loss)'
          path: "~/ma-logs/MIMIC4/UCBCS_DELTA"
          match: MIMIC_NON_IID_SUD_UCBCS_DELTA_seed
        - name: 'UCB-CS ($\|\Delta w\|$)'
          path: "~/ma-logs/MIMIC4/UCBCS_PARAM"
          match: MIMIC_NON_IID_SUD_UCBCS_PARAM_seed
    plot:
      legend:
        - FedAvg
        - MAX-CS
        - UCB-CS (loss)
        - 'UCB-CS ($\Delta$loss)'
        - 'UCB-CS ($\|\Delta w\|$)'
      labels: {x: Round, y: Accuracy}
      ylim: [0.0, 0.93]
